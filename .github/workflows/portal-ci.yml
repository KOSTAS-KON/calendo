name: Portal CI (compile + ORM)

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  portal-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install portal dependencies
        working-directory: portal
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile portal entrypoint
        run: |
          PYTHONPATH=portal python -m py_compile portal/app/main.py

      - name: ORM mapper check (imports all models)
        run: |
          PYTHONPATH=portal python -c "import app.models; from app.db import Base; print('tables:', sorted(list(Base.metadata.tables.keys())));"
