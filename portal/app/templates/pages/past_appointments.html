{% extends "layout.html" %}
{% set header = "Past Appointments" %}
{% block content %}

<form method="get" action="{{ rp }}/appointments" class="flex flex-wrap items-end gap-3 mb-4">
  <div>
    <label class="label">Child</label>
    <select name="child_id" class="input">
      <option value="">All</option>
      {% for c in children %}
        <option value="{{ c.id }}" {% if selected_child_id == c.id %}selected{% endif %}>{{ c.full_name }}</option>
      {% endfor %}
    </select>
  </div>
  <button class="btn" type="submit">Filter</button>
</form>

{% include "pages/_appointments_table.html" %}

{% endblock %}
