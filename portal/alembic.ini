[alembic]
; IMPORTANT:
; Keep this path relative to *this* ini file so migrations work when:
;  - running from repo root (e.g. Render Start Command)
;  - running from inside the portal/ folder
;  - running on Windows / Linux
script_location = %(here)s/alembic

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s

sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/postgres

