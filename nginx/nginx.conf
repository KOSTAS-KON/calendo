events {}

http {
  server_tokens off;

  # Basic rate limiting (per IP)
  limit_req_zone $binary_remote_addr zone=rl_general:10m rate=20r/s;
  limit_req_zone $binary_remote_addr zone=rl_login:10m rate=5r/m;

  server {
    listen 8080;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Landing page (static)
    location = / {
      root /usr/share/nginx/html;
      try_files /index.html =404;
    }

    # Convenience redirects
    location = /therapy { return 301 /therapy/; }
    location = /sms { return 301 /sms/; }

    # Block internal APIs from public access (defense in depth)
    location ~* ^/therapy/api/internal/ {
      return 403;
    }

    # Optional: throttle auth endpoints
    location ~* ^/therapy/(auth/)?login {
      limit_req zone=rl_login burst=10 nodelay;
      proxy_pass http://portal:8010/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix /therapy;
    }

    # SMS tool (Streamlit) mounted at /sms/
    location /sms/ {
      limit_req zone=rl_general burst=40 nodelay;

      proxy_pass http://sms:8501/sms/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # WebSocket support for Streamlit
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 3600;
      proxy_send_timeout 3600;
      proxy_buffering off;
    }

    # Therapy portal at /therapy/
    location /therapy/ {
      limit_req zone=rl_general burst=40 nodelay;

      proxy_pass http://portal:8010/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix /therapy;
    }
  }
}
